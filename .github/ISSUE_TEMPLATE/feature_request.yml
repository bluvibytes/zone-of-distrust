name: Feature Request
description: Propose a new capability, layer extension, or improvement to ZoD
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ZoD is intentionally incomplete. Your ideas help shape the framework.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of enhancement is this?
      options:
        - New layer capability
        - Layer modification
        - Integration pattern
        - Tooling / Developer experience
        - Documentation improvement
        - Governance / Policy
        - Other
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Related Layer(s)
      description: Which ZoD layer(s) does this relate to?
      multiple: true
      options:
        - L1 - OS Foundation (Infrastructure Integrity)
        - L2 - Input Control
        - L3 - Cognitive Isolation
        - L4 - Contextual Authority (CA / Request Validation)
        - L5 - Constrained Executor
        - L6 - Continuous Monitoring (Behavioral + Memory Audit)
        - L7 - Human Governance
        - Integrity Channel (cross-layer)
        - Cross-layer / Architecture-wide
        - Not layer-specific

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What gap does it fill?
      placeholder: Describe the use case or scenario this addresses
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How would you solve it? Be as specific or high-level as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: References, real-world scenarios, related frameworks, or threat models that inform this request
